<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غرفة الاستشارة — مكتب الاستشارات القانونية</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body style="margin:0; padding:0; background:#0D1B2F;">

<div class="consultation-wrapper">

  <!-- Header -->
  <div class="consultation-header">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-left:8px">
        <circle cx="26" cy="26" r="26" fill="#C9A84C" opacity="0.15"/>
        <line x1="26" y1="11" x2="26" y2="41" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
        <line x1="14" y1="18" x2="38" y2="18" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
        <path d="M14 18 L10 26 Q14 29 18 26 Z" fill="#C9A84C"/>
        <path d="M38 18 L34 26 Q38 29 42 26 Z" fill="#C9A84C"/>
        <line x1="20" y1="41" x2="32" y2="41" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
        <circle cx="26" cy="11" r="2" fill="#C9A84C"/>
      </svg>
      مكتب الاستشارات القانونية — <span>غرفة الاستشارة القانونية</span>
    </div>
    <div class="consultation-status">
      <div class="status-dot"></div>
      <span id="statusText">جارٍ الاتصال...</span>
    </div>
  </div>

  <!-- Waiting Room -->
  <div class="waiting-room" id="waitingRoom">
    <div class="spinner"></div>
    <h2>جارٍ تجهيز غرفة الاستشارة...</h2>
    <p id="waitingMsg">يرجى الانتظار بينما نتحقق من بيانات حجزك</p>
    <div id="waitingInfo" style="color:rgba(255,255,255,0.5); font-size:13px; margin-top:8px"></div>
  </div>

  <!-- JaaS Container -->
  <div class="jaas-container hidden" id="jaasContainer"></div>

  <!-- Error Screen -->
  <div class="waiting-room hidden" id="errorScreen">
    <div style="font-size:64px">❌</div>
    <h2 style="color:var(--danger)">تعذر الدخول</h2>
    <p id="errorMsg">رقم الحجز غير صحيح أو انتهت صلاحية الرابط.</p>
    <a href="/booking.html" class="btn-primary" style="margin-top:16px">احجز موعداً جديداً</a>
  </div>

</div>

<script src="/js/consultation.js"></script>
</body>
</html>
